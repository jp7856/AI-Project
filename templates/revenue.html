<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>행사 일정 관리 - 행사 일정표</title>
  <link href="/static/vendor/bootstrap.min.css" rel="stylesheet"/>
  <link href="/static/vendor/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; font-size: 1.3rem; }
    .main-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 28px; }
    .summary-card { border-radius: 10px; padding: 18px 22px; color: #fff; font-weight: 600; }
    .color-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
    .table th { white-space: nowrap; font-size: 0.85rem; color: #666; font-weight: 600; }
    .table td { vertical-align: middle; font-size: 0.88rem; }
    .badge-sm { font-size: 0.7rem; }
    .d-badge { font-size: 0.75rem; font-weight: 700; }
    .action-btns .btn { padding: 2px 8px; font-size: 0.8rem; }
    #searchInput { max-width: 220px; }
    .empty-state { text-align: center; padding: 60px 0; color: #aaa; }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 12px; }
    .revenue-cell { font-weight: 600; color: #198754; white-space: nowrap; }
    .revenue-empty { color: #ccc; font-size: 0.8rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary mb-4">
  <div class="container-fluid">
    <span class="navbar-brand"><i class="bi bi-calendar3-event"></i> 행사 일정표</span>
    <div class="d-flex gap-2">
      <a href="/" class="btn btn-outline-light btn-sm"><i class="bi bi-calendar3"></i> 달력 보기</a>
      <a href="/revenue" class="btn btn-outline-light btn-sm"><i class="bi bi-bar-chart-line"></i> 매출 현황</a>
      <a href="/settings" class="btn btn-outline-light btn-sm"><i class="bi bi-gear"></i> 이메일 설정</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">

  <!-- 요약 카드 -->
  <div class="row g-3 mb-4" id="summaryRow">
    <div class="col-sm-6 col-lg-3">
      <div class="summary-card bg-primary">
        <div class="small opacity-75">전체 행사</div>
        <div class="fs-4" id="sumTotal">-</div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="summary-card bg-success">
        <div class="small opacity-75">이번 달 매출</div>
        <div class="fs-5" id="sumMonth">-</div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="summary-card bg-info">
        <div class="small opacity-75">올해 누적 매출</div>
        <div class="fs-5" id="sumYear">-</div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="summary-card bg-dark">
        <div class="small opacity-75">전체 누적 매출</div>
        <div class="fs-5" id="sumGrand">-</div>
      </div>
    </div>
  </div>

  <div class="main-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold mb-0"><i class="bi bi-list-ul text-primary"></i> 행사 일정 목록</h5>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()">
        <i class="bi bi-plus-lg"></i> 행사 추가
      </button>
    </div>

    <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
      <input type="text" class="form-control form-control-sm" id="searchInput"
        placeholder="행사명, 장소 검색..." oninput="filterTable()"/>
      <select class="form-select form-select-sm" id="yearFilter" style="max-width:110px" onchange="filterTable()">
        <option value="">전체 연도</option>
      </select>
      <select class="form-select form-select-sm" id="statusFilter" style="max-width:120px" onchange="filterTable()">
        <option value="">전체 상태</option>
        <option value="upcoming">예정</option>
        <option value="ongoing">진행중</option>
        <option value="done">종료</option>
      </select>
      <span class="text-muted small ms-auto" id="countLabel"></span>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th style="width:28px"></th>
            <th>행사명</th>
            <th>시작일</th>
            <th>종료일</th>
            <th>기간</th>
            <th>장소</th>
            <th>매출 금액</th>
            <th>발송 현황</th>
            <th>D-Day</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="eventsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 행사 추가/수정 모달 -->
<div class="modal fade" id="eventModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"><i class="bi bi-calendar-plus"></i> 행사 추가</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="eventId"/>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label fw-semibold">행사명 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="eventTitle" placeholder="예) 2025 봄 페스티벌"/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">시작일 <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="eventStart"/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">종료일 <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="eventEnd"/>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">장소</label>
            <input type="text" class="form-control" id="eventLocation" placeholder="예) 서울 올림픽공원"/>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">내용</label>
            <textarea class="form-control" id="eventDesc" rows="2" placeholder="행사 설명을 입력하세요"></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">
              <i class="bi bi-currency-dollar text-success"></i> 매출 금액
              <span class="text-muted fw-normal small">(종료 후 입력)</span>
            </label>
            <div class="input-group">
              <input type="number" class="form-control" id="eventRevenue" placeholder="0" min="0" step="1000"/>
              <span class="input-group-text">원</span>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">표시 색상</label>
            <input type="color" class="form-control form-control-color w-100" id="eventColor" value="#3788d8"/>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">추가 수신자 <span class="text-muted fw-normal small">(선택)</span></label>
            <input type="text" class="form-control" id="eventEmail" placeholder="추가할 이메일 입력 (쉼표로 구분)"/>
            <div class="form-text">
              <i class="bi bi-envelope-check text-primary"></i>
              기본 수신: <strong>jp, kwonyh, ssem2 @neungyule.com</strong> + 위 추가 입력
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer justify-content-between">
        <button type="button" class="btn btn-danger btn-sm" id="deleteBtn" onclick="deleteEvent()" style="display:none">
          <i class="bi bi-trash"></i> 삭제
        </button>
        <div>
          <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">취소</button>
          <button type="button" class="btn btn-primary" onclick="saveEvent()">
            <span id="savingSpinner" class="spinner-border spinner-border-sm me-1" style="display:none"></span>저장
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/vendor/bootstrap.bundle.min.js"></script>
<script>
let allEvents = [];
const eventModal = new bootstrap.Modal(document.getElementById('eventModal'));
const fmt = n => n == null ? '' : Math.round(n).toLocaleString('ko-KR') + '원';

async function loadEvents() {
  const evRes = await fetch('/api/events');
  allEvents = await evRes.json();

  for (const ev of allEvents) {
    if (!ev.start_date) ev.start_date = ev.start;
    if (!ev.end_date) {
      const d = new Date(ev.end);
      d.setDate(d.getDate() - 1);
      ev.end_date = d.toISOString().split('T')[0];
    }
  }

  let rev = { monthly: [], yearly: [], grand_total: 0 };
  try {
    const revRes = await fetch('/api/revenue/summary');
    rev = await revRes.json();
  } catch (e) {}

  updateSummaryCards(rev);
  populateYearFilter();
  renderTable(allEvents);
}

function updateSummaryCards(rev) {
  const now = new Date();
  const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthData = rev.monthly.find(m => `${m.year}-${String(m.month).padStart(2,'0')}` === ym);
  const yearData  = rev.yearly.find(y => y.year === now.getFullYear());

  document.getElementById('sumTotal').textContent = `${allEvents.length}건`;
  document.getElementById('sumMonth').textContent = monthData ? fmt(monthData.total) : '0원';
  document.getElementById('sumYear').textContent  = yearData  ? fmt(yearData.total)  : '0원';
  document.getElementById('sumGrand').textContent = fmt(rev.grand_total) || '0원';
}

function populateYearFilter() {
  const years = [...new Set(allEvents.map(e => e.start_date?.slice(0,4)))].filter(Boolean).sort();
  const sel = document.getElementById('yearFilter');
  sel.innerHTML = '<option value="">전체 연도</option>';
  years.forEach(y => sel.innerHTML += `<option value="${y}">${y}년</option>`);
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const year = document.getElementById('yearFilter').value;
  const status = document.getElementById('statusFilter').value;
  const today = new Date().toISOString().split('T')[0];

  const filtered = allEvents.filter(ev => {
    const matchQ = !q || ev.title.toLowerCase().includes(q) || (ev.location||'').toLowerCase().includes(q);
    const matchY = !year || (ev.start_date||'').startsWith(year);
    let matchS = true;
    if (status === 'upcoming') matchS = ev.start_date > today;
    if (status === 'ongoing')  matchS = ev.start_date <= today && ev.end_date >= today;
    if (status === 'done')     matchS = ev.end_date < today;
    return matchQ && matchY && matchS;
  });
  renderTable(filtered);
}

function renderTable(events) {
  const tbody = document.getElementById('eventsBody');
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('countLabel').textContent = `총 ${events.length}건`;

  if (events.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state">
      <i class="bi bi-calendar-x"></i>
      ${document.getElementById('searchInput').value ? '검색 결과가 없습니다.' : '등록된 행사가 없습니다.<br><button class="btn btn-primary btn-sm mt-3" onclick="openAddModal()">첫 행사 추가하기</button>'}
    </div></td></tr>`;
    return;
  }

  events = [...events].sort((a,b) => a.start_date > b.start_date ? 1 : -1);

  tbody.innerHTML = events.map(ev => {
    const start = ev.start_date || '';
    const end   = ev.end_date || '';
    const days  = start && end ? Math.round((new Date(end)-new Date(start))/86400000)+1 : '-';
    const dLeft = start ? Math.ceil((new Date(start)-new Date(today))/86400000) : null;

    let dBadge = '-', rowClass = '';
    if (dLeft === null) {
      dBadge = '-';
    } else if (end < today) {
      dBadge = `<span class="badge bg-secondary d-badge">종료</span>`;
      rowClass = 'table-light';
    } else if (dLeft === 0) {
      dBadge = `<span class="badge bg-danger d-badge">D-Day</span>`;
      rowClass = 'table-warning';
    } else if (dLeft < 0) {
      dBadge = `<span class="badge bg-success d-badge">진행중</span>`;
      rowClass = 'table-success';
    } else {
      dBadge = `<span class="badge bg-warning text-dark d-badge">D-${dLeft}</span>`;
    }

    const notifyBadges =
      `<span class="badge ${ev.notified_1month ? 'bg-success' : 'bg-light text-muted border'} badge-sm me-1">1개월 ${ev.notified_1month ? '✓' : '대기'}</span>
       <span class="badge ${ev.notified_2weeks ? 'bg-success' : 'bg-light text-muted border'} badge-sm">2주 ${ev.notified_2weeks ? '✓' : '대기'}</span>`;

    const revenueCell = ev.revenue != null
      ? `<span class="revenue-cell">${fmt(ev.revenue)}</span>`
      : `<span class="revenue-empty">미입력</span>`;

    return `
      <tr class="${rowClass}" data-id="${ev.id}">
        <td><span class="color-dot" style="background:${ev.backgroundColor||'#3788d8'}"></span></td>
        <td class="fw-semibold">${ev.title}</td>
        <td>${start}</td>
        <td>${end}</td>
        <td>${days}일</td>
        <td>${ev.location || '<span class="text-muted small">-</span>'}</td>
        <td>${revenueCell}</td>
        <td>${notifyBadges}</td>
        <td>${dBadge}</td>
        <td class="action-btns">
          <button class="btn btn-outline-primary btn-sm me-1" onclick="openEditModal(${ev.id})">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-outline-danger btn-sm" onclick="confirmDelete(${ev.id}, '${ev.title.replace(/'/g,"\\'")}')">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>`;
  }).join('');
}

function openAddModal() {
  document.getElementById('eventId').value = '';
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventStart').value = '';
  document.getElementById('eventEnd').value = '';
  document.getElementById('eventLocation').value = '';
  document.getElementById('eventDesc').value = '';
  document.getElementById('eventEmail').value = '';
  document.getElementById('eventRevenue').value = '';
  document.getElementById('eventColor').value = '#3788d8';
  document.getElementById('modalTitle').innerHTML = '<i class="bi bi-calendar-plus"></i> 행사 추가';
  document.getElementById('deleteBtn').style.display = 'none';
  eventModal.show();
  setTimeout(() => document.getElementById('eventTitle').focus(), 300);
}

async function openEditModal(id) {
  const res = await fetch(`/api/events/${id}`);
  const ev = await res.json();
  document.getElementById('eventId').value = ev.id;
  document.getElementById('eventTitle').value = ev.title;
  document.getElementById('eventStart').value = ev.start_date;
  document.getElementById('eventEnd').value = ev.end_date;
  document.getElementById('eventLocation').value = ev.location || '';
  document.getElementById('eventDesc').value = ev.description || '';
  document.getElementById('eventEmail').value = ev.notify_email || '';
  document.getElementById('eventRevenue').value = ev.revenue != null ? ev.revenue : '';
  document.getElementById('eventColor').value = ev.backgroundColor || '#3788d8';
  document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil"></i> 행사 수정';
  document.getElementById('deleteBtn').style.display = 'inline-block';
  eventModal.show();
}

async function saveEvent() {
  const id = document.getElementById('eventId').value;
  const title = document.getElementById('eventTitle').value.trim();
  const start = document.getElementById('eventStart').value;
  const end   = document.getElementById('eventEnd').value;

  if (!title) { alert('행사명을 입력하세요.'); return; }
  if (!start || !end) { alert('날짜를 입력하세요.'); return; }
  if (end < start) { alert('종료일이 시작일보다 빠를 수 없습니다.'); return; }

  document.getElementById('savingSpinner').style.display = 'inline-block';

  const revVal = document.getElementById('eventRevenue').value;
  const payload = {
    title,
    start_date: start,
    end_date: end,
    location: document.getElementById('eventLocation').value,
    description: document.getElementById('eventDesc').value,
    notify_email: document.getElementById('eventEmail').value,
    color: document.getElementById('eventColor').value,
    revenue: revVal !== '' ? parseFloat(revVal) : null,
  };

  try {
    await fetch(id ? `/api/events/${id}` : '/api/events', {
      method: id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    eventModal.hide();
    await loadEvents();
  } catch {
    alert('저장 중 오류가 발생했습니다.');
  } finally {
    document.getElementById('savingSpinner').style.display = 'none';
  }
}

async function deleteEvent() {
  const id = document.getElementById('eventId').value;
  if (!id || !confirm('이 행사를 삭제하시겠습니까?')) return;
  await fetch(`/api/events/${id}`, { method: 'DELETE' });
  eventModal.hide();
  await loadEvents();
}

async function confirmDelete(id, title) {
  if (!confirm(`"${title}" 행사를 삭제하시겠습니까?`)) return;
  await fetch(`/api/events/${id}`, { method: 'DELETE' });
  await loadEvents();
}

loadEvents();
</script>
</body>
</html>
